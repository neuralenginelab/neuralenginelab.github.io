name: Deploy Neural Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install MyST
        run: npm install -g mystmd@1.10.1

      - name: Build MyST archive
        working-directory: kb
        run: myst build --html
        env:
          BASE_URL: /archive

      - name: Assemble site
        run: |
          set -e
          rm -rf _site
          mkdir -p _site/archive

          cp -r site/. _site/

          if [ ! -d "kb/_build/html" ]; then
            echo "ERROR: MyST build output not found"
            exit 1
          fi

          cp -r kb/_build/html/. _site/archive/

      - name: Inject custom CSS
        run: |
          cp kb/style.css _site/archive/style.css
          find _site/archive -name "*.html" | xargs sed -i 's|</head>|<link rel="stylesheet" href="/archive/style.css"></head>|'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
